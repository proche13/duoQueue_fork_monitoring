global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "email"

receivers:
  - name: "email"
    email_configs:
      - to: "your@email.com"
        from: "alertmanager@duoqueue.com"
        smarthost: "smtp.gmail.com:587"
        auth_username: "your@email.com"
        auth_password: "your_app_password"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]